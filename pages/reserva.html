<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lucky Air - Reserva de Vuelos</title>
    <link rel="stylesheet" href="../css/globales.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/footer.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/widget.css" />



    <script src="../js/theme.js"></script>
    <script src="../js/components/navbar.js" defer></script>
    <script src="../js/components/footer.js" defer></script>
    <script type="module" src="../js/components/booking.js" defer></script>
</head>
<body>

    <app-navbar root-path=".."></app-navbar>

    <div class="container">
    <main id="booking-main" class="main-content">
        <section class="modern-booking-widget">
            <div class="widget-tabs">
                <button class="widget-tab active">Vuelos</button>
                <button class="widget-tab">Paquetes</button>
            </div>
            <div class="widget-body">
                <div class="widget-header">
                    <h2 class="widget-title">¿A dónde quieres ir?</h2>
                    <div class="widget-options">
                        <button type="button" class="pill active"><span class="check">✓</span> Ida y vuelta</button>
                        <button type="button" class="pill">Solo ida</button>
                        <button type="button" class="pill">Multidestino</button>
                        <button type="button" class="dropdown-btn">v</button>
                    </div>
                </div>

                <form class="widget-form" action="#" method="get">
                    <div class="widget-locations">
                        <div class="location-input left">
                            <label for="origen">Desde</label>
                            <div class="autocomplete-container">
                                <input type="text" id="origen" placeholder="Ingresa un origen" autocomplete="off">
                                <div id="origen-dropdown" class="autocomplete-dropdown"></div>
                            </div>
                        </div>
                        <button type="button" class="swap-btn">⇄</button>
                        <div class="location-input right">
                            <label for="destino">Hacia</label>
                            <div class="autocomplete-container">
                                <input type="text" id="destino" placeholder="Ingresa un destino" autocomplete="off">
                                <div id="destino-dropdown" class="autocomplete-dropdown"></div>
                            </div>
                        </div>
                    </div>

                    <div class="widget-details">
                        <div class="widget-locations dates-group">
                            <div class="location-input left">
                                <label for="fecha-ida">Ida</label>
                                <input type="date" id="fecha-ida">
                            </div>
                            <div class="location-input right">
                                <label for="fecha-vuelta">Vuelta</label>
                                <input type="date" id="fecha-vuelta">
                            </div>
                        </div>

                        <div class="widget-locations passenger-group">
                            <div class="location-input single">
                                <label for="pasajeros-clase">Pasajeros y Clase</label>
                                <select id="pasajeros-clase" class="dropdown-invisible">
                                    <option value="1_eco">1 Pasajero, Economy</option>
                                    <option value="2_eco">2 Pasajeros, Economy</option>
                                    <option value="1_bus">1 Pasajero, Business</option>
                                    <option value="2_bus">2 Pasajeros, Business</option>
                                </select>
                            </div>
                        </div>

                        <div class="widget-locations promo-group">
                            <div class="location-input single">
                                <label for="codigo-promo">Código Promocional</label>
                                <input type="text" id="codigo-promo" placeholder="Ej. LUCKY2026">
                            </div>
                        </div>
                    </div>

                    <div class="widget-footer-actions">
                        <button type="button" class="btn btn-secondary">Buscar Paquetes</button>
                        <button type="submit" class="btn btn-primary">Buscar Vuelos</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
    </div>

    <app-footer root-path=".."></app-footer>

</body>
</html>
