<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lucky Air - Trabaja con Nosotros</title>
    <link rel="stylesheet" href="../css/globales.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/footer.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <script src="../js/theme.js"></script>
    <script src="../js/components/navbar.js" defer></script>
    <script src="../js/components/footer.js" defer></script>
</head>
<body>

    <app-navbar root-path=".."></app-navbar>

    <div class="container">
    <main id="careers-content" class="main-content">
        <section id="recruitment-hero" class="hero-section" style="background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('../assets/banner-trabajo.jpg');">
            <h2 style="color: white; font-size: 2.5rem; margin-bottom: 15px;">Únete a la Familia Lucky Air</h2>
            <p style="font-size: 1.1rem; max-width: 600px; margin: 0 auto; color: #f0f0f0;">
                Buscamos personas apasionadas por la aviación y el servicio al cliente para
                formar parte de la aerolínea con mayor crecimiento en el suroeste de China.
            </p>
        </section>

        <section id="application-form" class="application-section">
            <h3 class="section-title">Postula Aquí</h3>
            <p class="section-description">Envíanos tu información y nos pondremos en contacto contigo para una entrevista inicial.</p>

            <form action="#" method="post" enctype="multipart/form-data" class="job-form">
                <div class="form-group">
                    <label for="applicant-name">Nombre Completo:</label>
                    <input type="text" id="applicant-name" name="full_name" required class="form-input">
                </div>

                <div class="form-group">
                    <label for="applicant-email">Correo Electrónico:</label>
                    <input type="email" id="applicant-email" name="email" required class="form-input">
                </div>

                <div class="form-group">
                    <label for="position-apply">Posición de interés:</label>
                    <select id="position-apply" name="position" class="form-select">
                        <option value="cabin">Tripulación de Cabina</option>
                        <option value="it">Sistemas / IT</option>
                        <option value="ground">Servicio en Tierra</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cv-file">Sube tu CV (PDF):</label>
                    <input type="file" id="cv-file" name="resume" accept=".pdf,.doc,.docx" required class="form-file" style="margin-top: 5px; margin-bottom: 15px; color: var(--text-color);">
                </div>

                <div class="form-group">
                    <label for="cover-letter">Breve presentación (Opcional):</label>
                    <textarea id="cover-letter" name="bio" rows="4" placeholder="Cuéntanos por qué quieres trabajar en Lucky Air..." class="form-textarea"></textarea>
                </div>

                <div class="form-actions" style="margin-top: 15px; text-align: right;">
                    <button type="submit" class="btn btn-primary">Enviar Postulación</button>
                </div>
            </form>
        </section>
    </main>

    </div>

    <app-footer root-path=".."></app-footer>

</body>
</html>
